<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Rocket 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(180deg, #E3F2FD 0%, #FFF9F0 100%);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .cloud { position: fixed; font-size: 4rem; opacity: 0.5; pointer-events: none; animation: floatCloud 12s ease-in-out infinite; }
  .cloud:nth-child(1){ top:5%;  left:2%;  animation-delay:0s; }
  .cloud:nth-child(2){ top:12%; right:3%; animation-delay:4s; }
  .cloud:nth-child(3){ top:6%;  left:42%; animation-delay:8s; font-size:2.5rem; }
  @keyframes floatCloud { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }

  header {
    text-align: center;
    padding: 48px 20px 32px;
    position: relative;
  }
  .logo-row { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .logo-icon { font-size: 3rem; animation: wobble 2s ease-in-out infinite; }
  @keyframes wobble { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.5rem, 7vw, 4rem);
    color: #1A237E;
    text-shadow: 4px 4px 0 rgba(79,195,247,0.3);
  }
  header h1 span { color: #FF7043; }
  .tagline { font-size: 1rem; color: #555; font-weight: 600; margin-top: 8px; }

  .score-bar {
    display: flex; justify-content: center; gap: 20px;
    margin-top: 16px; flex-wrap: wrap;
  }
  .score-chip {
    background: white; padding: 10px 24px; border-radius: 30px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    font-weight: 800; font-size: 1rem;
    display: flex; align-items: center; gap: 8px;
  }

  .game-wrap { max-width: 860px; margin: 0 auto; padding: 0 20px 60px; }

  .rocket-arena {
    background: linear-gradient(180deg, #1a1a3e 0%, #3f1f6e 50%, #1a3a1a 100%);
    border-radius: 24px; overflow: hidden; position: relative;
    padding: 40px 40px 48px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }

  .star-p {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle { 0%,100%{opacity:0.3} 50%{opacity:1} }

  .level-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.1); color: #FDD835;
    border: 1px solid rgba(253,216,53,0.3); border-radius: 20px;
    padding: 6px 16px; font-size: 0.8rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 32px;
  }

  .rocket-scene {
    display: flex; align-items: center; justify-content: center;
    gap: 40px; margin-bottom: 40px; flex-wrap: wrap;
  }
  .rocket-emoji {
    font-size: 5rem; position: relative;
    animation: rocketHover 2s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(253,216,53,0.5));
  }
  @keyframes rocketHover { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .rocket-flames {
    position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
    font-size: 2rem; animation: flicker 0.3s ease-in-out infinite alternate;
  }
  @keyframes flicker { from{transform:translateX(-50%) scale(1)} to{transform:translateX(-50%) scale(1.15)} }

  .question-bubble {
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 20px; padding: 28px 36px; text-align: center;
    backdrop-filter: blur(10px); max-width: 320px; color: white;
  }
  .q-label { font-size: 0.8rem; color: rgba(255,255,255,0.6); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .q-math {
    font-family: 'Fredoka One', cursive; font-size: 3rem;
    color: #FDD835; text-shadow: 0 0 30px rgba(253,216,53,0.5);
  }

  .timer-ring {
    width: 80px; height: 80px; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .timer-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .timer-ring circle.bg  { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
  .timer-ring circle.prog { fill: none; stroke: #FDD835; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 220; transition: stroke-dashoffset 1s linear; }
  .timer-num { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: white; z-index: 1; }

  .options-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
    max-width: 460px; margin: 0 auto 28px;
  }
  .opt-btn {
    padding: 18px 16px; border: 3px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08); color: white;
    font-family: 'Fredoka One', cursive; font-size: 1.8rem;
    cursor: pointer; border-radius: 16px;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .opt-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.04); border-color: #FDD835; }
  .opt-btn.correct-ans { background: rgba(102,187,106,0.4); border-color: #66BB6A; animation: popAnim 0.5s ease; }
  .opt-btn.wrong-ans   { background: rgba(244,67,54,0.3);  border-color: #f44336; animation: shakeAnim 0.4s ease; }
  @keyframes popAnim   { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  @keyframes shakeAnim { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

  .feedback-msg {
    text-align: center; font-family: 'Fredoka One', cursive;
    font-size: 1.4rem; min-height: 36px; margin-bottom: 16px; color: white;
  }
  .progress-bg {
    height: 12px; background: rgba(255,255,255,0.15); border-radius: 6px;
    overflow: hidden; max-width: 460px; margin: 0 auto;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #FDD835, #FF7043);
    border-radius: 6px; transition: width 0.5s ease; width: 0%;
  }

  .stats-row { display: flex; justify-content: center; gap: 32px; margin-top: 24px; }
  .stat-b { text-align: center; color: rgba(255,255,255,0.8); }
  .stat-b .num { font-family: 'Fredoka One', cursive; font-size: 2rem; color: #FDD835; display: block; }
  .stat-b .lbl { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }

  .result-screen {
    display: none; text-align: center; padding: 60px 40px;
    background: linear-gradient(180deg, #1a1a3e 0%, #3f1f6e 100%);
    border-radius: 24px; color: white;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
  }
  .result-screen.show { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .result-emoji { font-size: 5rem; margin-bottom: 16px; display: block; animation: bounce 1s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
  .result-title { font-family: 'Fredoka One', cursive; font-size: 2.8rem; color: #FDD835; margin-bottom: 8px; }
  .result-score { font-size: 1.2rem; color: rgba(255,255,255,0.8); margin-bottom: 32px; }
  .fun-fact { font-size: 0.95rem; color: rgba(255,255,255,0.55); margin-bottom: 24px; }
  .play-again {
    padding: 16px 48px; background: linear-gradient(135deg, #FF7043, #FDD835);
    border: none; border-radius: 16px; font-family: 'Fredoka One', cursive;
    font-size: 1.4rem; color: white; cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,112,67,0.4);
    transition: transform 0.2s;
  }
  .play-again:hover { transform: scale(1.06) translateY(-2px); }

  .confetti-piece {
    position: fixed; z-index: 999; pointer-events: none;
    font-size: 1.5rem;
    animation: confettiFall 2s ease-in forwards;
  }
  @keyframes confettiFall {
    0%  { transform: translateY(-80px) rotate(0deg);   opacity: 1; }
    100%{ transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @media(max-width:600px){
    .rocket-scene { flex-direction: column; }
    .rocket-arena { padding: 24px 20px 36px; }
  }
</style>
</head>
<body>

<div class="cloud">☁️</div>
<div class="cloud">☁️</div>
<div class="cloud">☁️</div>

<header>
  <div class="logo-row">
    <div class="logo-icon">🚀</div>
    <h1>Maths <span>Rocket</span></h1>
    <div class="logo-icon" style="animation-delay:0.5s">⭐</div>
  </div>
  <p class="tagline">Solve the sums  fly higher! </p>
  <div class="score-bar">
    <div class="score-chip">⭐ Stars: <span id="totalStars">0</span></div>
    <div class="score-chip">🏆 Best: <span id="bestScore">0</span></div>
  </div>
</header>

<div class="game-wrap">

  <div class="rocket-arena" id="rocketArena">
    <div id="starsAnim"></div>

    <div class="level-badge">🚀 Level <span id="rLevel">1</span> — Space Explorer</div>

    <div class="rocket-scene">
      <div class="rocket-emoji">
        🚀
        <div class="rocket-flames">🔥</div>
      </div>

      <div class="question-bubble">
        <div class="q-label">Solve to fly higher!</div>
        <div class="q-math" id="rQuestion">Loading...</div>
      </div>

      <div class="timer-ring">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <circle class="bg"   cx="40" cy="40" r="35"/>
          <circle class="prog" cx="40" cy="40" r="35" id="timerCircle"/>
        </svg>
        <div class="timer-num" id="timerNum">15</div>
      </div>
    </div>

    <div class="options-grid" id="rOptions"></div>

    <div class="feedback-msg" id="rFeedback">Choose your answer!</div>

    <div class="progress-bg">
      <div class="progress-fill" id="rProgress"></div>
    </div>

    <div class="stats-row">
      <div class="stat-b"><span class="num" id="rScore">0</span><span class="lbl">Points</span></div>
      <div class="stat-b"><span class="num" id="rStreak">0</span><span class="lbl">Streak 🔥</span></div>
      <div class="stat-b"><span class="num" id="rQ">0</span><span class="lbl">/ 10</span></div>
    </div>
  </div>

  <div class="result-screen" id="rResult">
    <span class="result-emoji" id="rEmoji">🏆</span>
    <div class="result-title"  id="rTitle">Awesome!</div>
    <div class="result-score"  id="rResultScore"></div>
    <div class="fun-fact"      id="rFunFact"></div>
    <button class="play-again" onclick="startGame()">Play Again! 🚀</button>
  </div>

</div>

<script>
  const sa = document.getElementById('starsAnim');
  sa.style.cssText = 'position:absolute;inset:0;pointer-events:none';
  for(let i = 0; i < 40; i++){
    const s = document.createElement('div');
    s.className = 'star-p';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;
      animation-delay:${Math.random()*3}s`;
    sa.appendChild(s);
  }

  const CIRCUMFERENCE = 220;
  let rTimer, rTime, rCurrent, rScore, rStreak, rAnswered, bestScore = 0;

  const funFacts = [
    "The number 0 was invented in India! 🇮🇳",
    "A triangle has 3 sides — 'tri' means 3! 🔺",
    "Prime numbers can only be divided by 1 and themselves! 🔢",
    "1 million has six zeros: 1,000,000 🤯",
    "12 × 12 = 144, which is called a 'gross'! 📐",
  ];

  function generateQuestion(level) {
    const ops = ['+', '-', '×'];
    const maxN = level <= 3 ? 12 : level <= 6 ? 20 : 50;
    const op = ops[Math.floor(Math.random() * (level < 4 ? 2 : 3))];
    let a = Math.floor(Math.random() * maxN) + 1;
    let b = Math.floor(Math.random() * (maxN / 2)) + 1;
    let ans;
    if(op === '+') { ans = a + b; }
    else if(op === '-') { if(b > a)[a, b] = [b, a]; ans = a - b; }
    else { a = Math.floor(Math.random()*12)+1; b = Math.floor(Math.random()*12)+1; ans = a*b; }
    return { q: `${a} ${op} ${b} = ?`, ans };
  }

  function generateOptions(ans) {
    const set = new Set([ans]);
    while(set.size < 4){
      const wrong = ans + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random()*10)+1);
      if(wrong !== ans && wrong > 0) set.add(wrong);
    }
    return [...set].sort(() => Math.random() - 0.5);
  }

  function startGame() {
    rCurrent = 0; rScore = 0; rStreak = 0; rAnswered = false;
    document.getElementById('rResult').classList.remove('show');
    document.getElementById('rocketArena').style.display = 'block';
    document.getElementById('rScore').textContent  = '0';
    document.getElementById('rStreak').textContent = '0';
    document.getElementById('rQ').textContent      = '0';
    document.getElementById('rProgress').style.width = '0%';
    loadQuestion();
  }

  function loadQuestion() {
    if(rCurrent >= 10) { showResult(); return; }
    rAnswered = false;

    const level = Math.ceil((rCurrent + 1) / 3);
    document.getElementById('rLevel').textContent = level;

    const { q, ans } = generateQuestion(level);
    window._ans = ans;

    document.getElementById('rQuestion').textContent = q;
    document.getElementById('rFeedback').textContent = 'Choose your answer! 🎯';
    document.getElementById('rQ').textContent = rCurrent;
    document.getElementById('rProgress').style.width = (rCurrent / 10 * 100) + '%';

    const opts = generateOptions(ans);
    const grid = document.getElementById('rOptions');
    grid.innerHTML = '';
    opts.forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = o;
      btn.onclick = () => checkAnswer(o, btn);
      grid.appendChild(btn);
    });

    clearInterval(rTimer);
    rTime = 15;
    updateTimer(rTime);
    rTimer = setInterval(() => {
      rTime--;
      updateTimer(rTime);
      if(rTime <= 0){
        clearInterval(rTimer);
        if(!rAnswered){
          rAnswered = true; rStreak = 0;
          document.getElementById('rStreak').textContent = 0;
          document.getElementById('rFeedback').textContent = `⏰ Time's up! Answer was ${ans}`;
          setTimeout(() => { rCurrent++; loadQuestion(); }, 1800);
        }
      }
    }, 1000);
  }

  function updateTimer(t) {
    document.getElementById('timerNum').textContent = t;
    const offset = CIRCUMFERENCE * (1 - t / 15);
    const circ = document.getElementById('timerCircle');
    circ.style.strokeDashoffset = offset;
    circ.style.stroke = t <= 5 ? '#f44336' : t <= 10 ? '#FF9800' : '#FDD835';
  }

  function checkAnswer(val, btn) {
    if(rAnswered) return;
    rAnswered = true;
    clearInterval(rTimer);

    if(val === window._ans){
      btn.classList.add('correct-ans');
      const pts = 100 + rStreak * 20 + rTime * 5;
      rScore += pts; rStreak++;
      document.getElementById('rScore').textContent  = rScore;
      document.getElementById('rStreak').textContent = rStreak;
      document.getElementById('rFeedback').textContent =
        rStreak > 2 ? `🔥 ${rStreak}x Streak! +${pts} pts!` : `✅ Correct! +${pts} pts!`;
      confetti(3);
    } else {
      btn.classList.add('wrong-ans');
      document.querySelectorAll('.opt-btn').forEach(b => {
        if(+b.textContent === window._ans) b.classList.add('correct-ans');
      });
      rStreak = 0;
      document.getElementById('rStreak').textContent = 0;
      document.getElementById('rFeedback').textContent = `❌ Oops! Answer was ${window._ans}`;
    }
    rCurrent++;
    setTimeout(loadQuestion, 2000);
  }

  function showResult() {
    clearInterval(rTimer);
    document.getElementById('rocketArena').style.display = 'none';
    const res = document.getElementById('rResult');
    res.classList.add('show');

    if(rScore > bestScore) bestScore = rScore;
    document.getElementById('bestScore').textContent  = bestScore;
    document.getElementById('totalStars').textContent = Math.floor(bestScore / 100);

    let emoji = '🚀', title = 'Keep Flying!';
    if(rScore >= 1200){ emoji = '🏆🌟🏆'; title = 'LEGENDARY!'; }
    else if(rScore >= 800){ emoji = '🌟🚀'; title = 'Superstar!'; }
    else if(rScore >= 400){ emoji = '👍🚀'; title = 'Well Done!'; }

    document.getElementById('rEmoji').textContent    = emoji;
    document.getElementById('rTitle').textContent    = title;
    document.getElementById('rResultScore').textContent = `You scored ${rScore} points!`;
    document.getElementById('rFunFact').textContent  = funFacts[Math.floor(Math.random() * funFacts.length)];
    confetti(15);
  }

  function confetti(count) {
    const emojis = ['⭐','🌟','✨','🎉','🎊','💫'];
    for(let i = 0; i < count; i++){
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.animationDelay = Math.random() * 0.4 + 's';
        c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 2500);
      }, i * 100);
    }
  }

  startGame();
</script>
</body>
</html>
